name: Publish Presentations

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-presentations.yml
      - package.json
      - package-lock.json
      - marp.config.mjs
      - mermaid.config.json
      - mermaid.puppeteer-config.json
      - presentations/**
      - scripts/build-marp.mjs
      - scripts/build-mermaid.mjs
      - scripts/presentation-utils.mjs
      - scripts/validate-local-presentations.mjs
      - scripts/validate-published-presentations.mjs
      - scripts/notify-zulip.mjs
      - themes/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build presentations
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate built presentation layouts
        run: npm run validate:local

      - name: Enable static asset publishing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validate:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate published presentation URLs
        env:
          PRESENTATION_SITE_URL: ${{ needs.deploy.outputs.page_url }}
        run: node ./scripts/validate-published-presentations.mjs

  notify:
    runs-on: ubuntu-latest
    needs:
      - deploy
      - validate
    if: ${{ github.ref == 'refs/heads/main' && needs.deploy.result == 'success' && needs.validate.result == 'success' }}
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files for this publish
        id: changed-files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt
          else
            git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" > changed-files.txt || true
          fi

          {
            echo 'files<<EOF'
            cat changed-files.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send Zulip publish notification
        env:
          CHATTAIPUBLISHINGBOTEMAIL: ${{ secrets.CHATTAIPUBLISHINGBOTEMAIL }}
          CHATTAIPUBLISHINGBOTKEY: ${{ secrets.CHATTAIPUBLISHINGBOTKEY }}
          PRESENTATION_SITE_URL: ${{ needs.deploy.outputs.page_url }}
          ZULIP_CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
          ZULIP_ORG_URL: https://chatt-ai.zulipchat.com
          ZULIP_STREAM: general
          ZULIP_TOPIC: Meet Presentation Decks
        run: node ./scripts/notify-zulip.mjs
